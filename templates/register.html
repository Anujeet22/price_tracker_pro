{% extends "base.html" %}

{% block title %}Register{% endblock %}
{% block css %} <link rel="stylesheet"href="{{url_for('static',filename='css/register.css')}}">
{% endblock %}
{% block content %}
<div class="container">
  <div class="card">
    <div class="card__content">

    <div class="header">
     <h1 class="title">Create Account</h1>
     <p class="subtitle">Start tracking product prices</p>
    </div>

      {% include "components/flash_messages.html" %}

      <form method="POST" style="display:flex; flex-direction:column; gap:1rem;">

        <div class="field-wrapper">
          <input type="text"name="username"class="field-input"placeholder="Username"required>
          <label class="filed-label"></label>
        </div>
        <div class="filed-wrapper">
          <input type="email"name="email"class="field-input"placeholder="Email"required>
          <label class="field"></label>
        </div>
        <div class="field-wrapper">
          <input type="password"name="password"class="field-input"placeholder="Password"required>
        </div>
        <button class="btn"type="submit">Create Account</button>
      </form>
      <p style="margin-top:1rem;">
        Already have an account?
        <a href="{{ url_for('login') }}">Login</a>
      </p>

    </div>
  </div>
</div>
{% endblock %}
