<!-- SETTINGS TAB -->
<div id="section-settings" class="tab-section" style="display: none;">

  <section class="section section--last reveal">
    <div class="section-header">
      <h2 class="section-header__title">Settings</h2>
    </div>

    <!-- Account -->
    <div class="card" style="margin-bottom: 1.5rem;">
      <div class="card__header">
        <h3 class="card__title">Account</h3>
      </div>
      <div class="card__content" style="display: flex; flex-direction: column; gap: 1rem;">

        <div style="padding: 1rem; background-color: var(--bg-subtle); border-radius: 0.75rem;">
          <p style="margin: 0 0 0.25rem 0; font-size: 0.8125rem; color: var(--text-tertiary);">Username</p>
          <p style="margin: 0; font-weight: 600; color: var(--text);">{{ current_user.username }}</p>
        </div>

        <div style="padding: 1rem; background-color: var(--bg-subtle); border-radius: 0.75rem;">
          <p style="margin: 0 0 0.25rem 0; font-size: 0.8125rem; color: var(--text-tertiary);">Email</p>
          <p style="margin: 0; font-weight: 600; color: var(--text);">{{ current_user.email }}</p>
        </div>

      </div>
    </div>

    <!-- Alert Preferences -->
    <div class="card" style="margin-bottom: 1.5rem;">
      <div class="card__header">
        <h3 class="card__title">Alert Preferences</h3>
      </div>
      <div class="card__content" style="display: flex; flex-direction: column; gap: 1.5rem;">

        <div>
          <label style="display: block; font-weight: 600; color: var(--text); margin-bottom: 0.25rem; font-size: 0.875rem;">Notification Email</label>
          <p style="margin: 0 0 0.75rem 0; font-size: 0.8125rem; color: var(--text-tertiary);">Price drop alerts will be sent to this address</p>
          <input type="email" placeholder="{{ current_user.email }}" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-subtle); border-radius: 0.75rem; font-size: 0.875rem; color: var(--text); background-color: var(--bg); font-family: inherit; outline: none;">
        </div>

        <div style="border-top: 1px solid var(--border-subtle); padding-top: 1.5rem;">
          <label style="display: block; font-weight: 600; color: var(--text); margin-bottom: 0.25rem; font-size: 0.875rem;">Default Alert Threshold</label>
          <p style="margin: 0 0 0.75rem 0; font-size: 0.8125rem; color: var(--text-tertiary);">Alert me when price drops by at least</p>
          <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
            <button class="btn btn--secondary threshold-btn active-threshold" data-value="5" style="padding: 0.5rem 1rem; font-size: 0.8125rem;">5%</button>
            <button class="btn btn--secondary threshold-btn" data-value="10" style="padding: 0.5rem 1rem; font-size: 0.8125rem;">10%</button>
            <button class="btn btn--secondary threshold-btn" data-value="15" style="padding: 0.5rem 1rem; font-size: 0.8125rem;">15%</button>
            <button class="btn btn--secondary threshold-btn" data-value="20" style="padding: 0.5rem 1rem; font-size: 0.8125rem;">20%</button>
          </div>
        </div>

      </div>
    </div>

    <!-- Actions -->
    <div class="card">
      <div class="card__header">
        <h3 class="card__title">Actions</h3>
      </div>
      <div class="card__content" style="display: flex; flex-direction: column; gap: 1rem;">

        <a href="#" class="btn btn--secondary" style="justify-content: center;">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 1rem; height: 1rem;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
          </svg>
          Change Password
        </a>

        <a href="{{ url_for('logout') }}" class="btn btn--secondary" style="justify-content: center; color: var(--danger); border-color: var(--danger);">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 1rem; height: 1rem;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Logout
        </a>

      </div>
    </div>

  </section>

</div>

<style>
  .active-threshold {
    background-color: var(--primary) !important;
    border-color: var(--primary) !important;
    color: white !important;
  }
</style>

<script>
  document.querySelectorAll('.threshold-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.threshold-btn').forEach(function(b) {
        b.classList.remove('active-threshold');
      });
      this.classList.add('active-threshold');
    });
  });
</script>
